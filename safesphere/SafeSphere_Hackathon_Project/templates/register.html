{% extends 'base.html' %}
{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-card glass glow-border">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join the Universal AI Emergency Response System</p>
            </div>
            {% if error %}
                <div class="alert alert-error"><i class="ph ph-warning-circle"></i> {{ error }}</div>
            {% endif %}
            <form method="POST" action="{{ url_for('register') }}" class="auth-form" aria-label="Registration form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <div class="input-icon">
                        <i class="ph ph-identification-card" aria-hidden="true"></i>
                        <input type="text" id="name" name="name" placeholder="John Doe" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-icon">
                        <i class="ph ph-envelope" aria-hidden="true"></i>
                        <input type="email" id="email" name="email" placeholder="john@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <div class="input-icon">
                        <i class="ph ph-phone" aria-hidden="true"></i>
                        <input type="tel" id="phone" name="phone" placeholder="+1 234 567 8900" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="username">Choose Username</label>
                    <div class="input-icon">
                        <i class="ph ph-user-plus" aria-hidden="true"></i>
                        <input type="text" id="username" name="username" placeholder="Unique username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Secure Password</label>
                    <div class="input-icon">
                        <i class="ph ph-lock-key" aria-hidden="true"></i>
                        <input type="password" id="password" name="password" placeholder="Strong password" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary w-100 mt-4" aria-label="Submit registration">Register System <i class="ph ph-arrow-right" aria-hidden="true"></i></button>
            </form>
            
            <div class="auth-separator" aria-hidden="true" style="text-align:center; margin: 30px 0 20px; position:relative;">
                <hr style="border-color: rgba(255,255,255,0.1);">
                <span style="background:var(--surface-color); padding:0 15px; position:absolute; top:-10px; left:50%; transform:translateX(-50%); font-size:0.9rem;">or sign up with</span>
            </div>
            
            <div class="social-logins" style="display:flex; gap:10px; flex-direction:column;">
                <a href="{{ url_for('mock_oauth', provider='google') }}" class="btn-secondary w-100" style="color:var(--text-light); border-color:var(--text-main);"><i class="ph-fill ph-google-logo text-danger" style="margin-right:10px;"></i> Google</a>
                <a href="{{ url_for('mock_oauth', provider='facebook') }}" class="btn-secondary w-100" style="color:var(--text-light); border-color:var(--text-main);"><i class="ph-fill ph-facebook-logo text-primary" style="margin-right:10px;"></i> Facebook</a>
            </div>

            <div class="auth-footer mt-4" style="text-align:center;">
                Already have an account? <a href="{{ url_for('login') }}" class="text-accent">Login</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
