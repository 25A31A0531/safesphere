{% extends 'base.html' %}
{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-card glass glow-border" style="background:var(--surface-color);">
            <div class="auth-header">
                <h2>Reset Password</h2>
                <p>Recover access to your SafeSphere dashboard</p>
            </div>
            <form method="POST" action="#" class="auth-form" role="form">
                <div class="form-group">
                    <label for="email">Account Email</label>
                    <div class="input-icon">
                        <i class="ph ph-envelope" aria-hidden="true"></i>
                        <input type="email" id="email" name="email" placeholder="Enter your registered email" required aria-required="true">
                    </div>
                </div>
                <!-- Mock action for demonstration -->
                <button type="button" onclick="alert('Password reset link sent to your email.'); window.location.href='{{ url_for('login') }}';" class="btn-primary w-100 mt-4" aria-label="Send Reset Link">Send Recovery Link <i class="ph ph-paper-plane-right" aria-hidden="true"></i></button>
            </form>
            <div class="auth-footer mt-4 text-center">
                Remember your password? <a href="{{ url_for('login') }}" class="text-accent" aria-label="Return to Login">Back to Login</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
