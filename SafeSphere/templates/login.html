{% extends 'base.html' %}
{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-card glass glow-border">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Login to access the SafeSphere Dashboard</p>
            </div>
            {% if error %}
                <div class="alert alert-error"><i class="ph ph-warning-circle"></i> {{ error }}</div>
            {% endif %}
            <form method="POST" action="{{ url_for('login') }}" class="auth-form" aria-label="Login form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-icon">
                        <i class="ph ph-user" aria-hidden="true"></i>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-icon">
                        <i class="ph ph-lock" aria-hidden="true"></i>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary w-100 mt-4" aria-label="Submit login">Secure Login <i class="ph ph-arrow-right" aria-hidden="true"></i></button>
            </form>
            
            <div style="text-align:right; margin-top:10px;">
                <a href="{{ url_for('forgot_password') }}" class="text-gray" style="font-size:0.9rem;">Forgot Password?</a>
            </div>
            
            <div class="auth-separator" aria-hidden="true" style="text-align:center; margin: 30px 0 20px; position:relative;">
                <hr style="border-color: rgba(255,255,255,0.1);">
                <span style="background:var(--surface-color); padding:0 15px; position:absolute; top:-10px; left:50%; transform:translateX(-50%); font-size:0.9rem;">or sign in with</span>
            </div>
            
            <div class="social-logins" style="display:flex; gap:10px; flex-direction:column;">
                <a href="{{ url_for('mock_oauth', provider='google') }}" class="btn-secondary w-100" style="color:var(--text-light); border-color:var(--text-main);"><i class="ph-fill ph-google-logo text-danger" style="margin-right:10px;"></i> Google</a>
                <a href="{{ url_for('mock_oauth', provider='facebook') }}" class="btn-secondary w-100" style="color:var(--text-light); border-color:var(--text-main);"><i class="ph-fill ph-facebook-logo text-primary" style="margin-right:10px;"></i> Facebook</a>
            </div>

            <div class="auth-footer mt-4" style="text-align:center;">
                Don't have a SafeSphere account? <a href="{{ url_for('register') }}" class="text-accent">Get Started</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
